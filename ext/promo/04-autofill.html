<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 800px;
    background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 50%, #5b21b6 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  .layout { display: flex; align-items: center; gap: 60px; }
  .text-side { color: #fff; max-width: 420px; }
  .text-side h1 { font-size: 42px; font-weight: 800; line-height: 1.15; margin-bottom: 16px; }
  .text-side p { font-size: 18px; opacity: 0.85; line-height: 1.6; }
  .text-side .platforms { margin-top: 20px; font-size: 14px; opacity: 0.7; line-height: 1.8; }
  .form-mock {
    width: 460px; background: #fff; border-radius: 16px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.35); overflow: hidden;
  }
  .form-topbar {
    background: #f8f9fa; padding: 12px 20px; border-bottom: 1px solid #eee;
    font-size: 14px; font-weight: 600; color: #444;
  }
  .form-body { padding: 24px; }
  .form-field { margin-bottom: 16px; }
  .form-field label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 5px; }
  .form-field input {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 14px; color: #1a1a2e; font-family: inherit; background: #fff;
  }
  .form-field input.filled {
    box-shadow: 0 0 0 2px rgba(67, 97, 238, 0.3);
    background: #fafbff;
  }
  .form-row { display: flex; gap: 16px; }
  .form-row .form-field { flex: 1; }
  .autofill-btn {
    position: fixed; bottom: 200px; right: 120px;
    padding: 10px 18px; background: #22c55e; color: #fff; border: none;
    border-radius: 24px; font-size: 14px; font-weight: 600;
    box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
  }
</style>
</head>
<body>
<div class="layout">
  <div class="text-side">
    <h1>Autofill any application form</h1>
    <p>Set up your profile once. Jobber fills in name, email, phone, LinkedIn, and more on every application page.</p>
    <div class="platforms">
      Works with popular ATS platforms and job boards<br>
      + right-click autofill on any website
    </div>
  </div>
  <div class="form-mock">
    <div class="form-topbar">Application for Senior Backend Engineer</div>
    <div class="form-body">
      <div class="form-row">
        <div class="form-field">
          <label>First Name *</label>
          <input value="Alex" class="filled" readonly>
        </div>
        <div class="form-field">
          <label>Last Name *</label>
          <input value="Jobseeker" class="filled" readonly>
        </div>
      </div>
      <div class="form-field">
        <label>Email *</label>
        <input value="alex@example.com" class="filled" readonly>
      </div>
      <div class="form-field">
        <label>Phone</label>
        <input value="+1 (555) 123-4567" class="filled" readonly>
      </div>
      <div class="form-field">
        <label>LinkedIn Profile</label>
        <input value="linkedin.com/in/alexjobseeker" class="filled" readonly>
      </div>
      <div class="form-field">
        <label>Resume *</label>
        <input value="" placeholder="Upload your resume..." readonly>
      </div>
    </div>
  </div>
  <button class="autofill-btn">&#x2713; Filled 5 fields</button>
</div>
</body>
</html>
