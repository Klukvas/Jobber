################################################################################
# GitHub Actions Workflow: Deploy DEV Environment
################################################################################
#
# Purpose:
#   Build and deploy frontend/backend Docker images to a single Hetzner VM
#   using Docker Hub as the container registry and Docker Compose for orchestration.
#
# Key Design Principles:
#
#   1. PATH-BASED DEPLOYMENT
#      - Only build/push images for services that changed
#      - Changes in `be/**` → build backend only
#      - Changes in `fe/**` → build frontend only
#      - Changes in shared files (docker-compose.yml) → build both
#      - This reduces build time and Docker Hub bandwidth usage
#
#   2. RUNTIME SECRETS SAFETY
#      - The `.env` file on the server contains ALL runtime secrets
#      - GitHub Actions NEVER creates, modifies, or overwrites this file
#      - No application secrets appear in GitHub Actions logs
#      - No secrets are baked into Docker images
#      - GitHub Secrets are ONLY used for CI/CD operations (Docker Hub, SSH)
#
#   3. DATA PERSISTENCE
#      - Named volumes (postgres_data, redis_data) persist across deployments
#      - `docker compose up -d` safely recreates containers WITHOUT removing volumes
#      - NEVER run `docker compose down -v` in automation (destroys data!)
#      - Volumes survive container removal and are reattached to new containers
#
#   4. IMMUTABLE IMAGE TAGGING
#      - Every image is tagged with commit SHA (e.g., `andreypavlenko/jobber-backend:abc123`)
#      - Optional `dev` tag for convenience (e.g., `andreypavlenko/jobber-backend:dev`)
#      - Rollback: Re-run workflow on any previous commit to deploy that SHA
#      - Never rely on `latest` tag only
#
#   5. PUSH-BASED DEPLOYMENT
#      - GitHub Actions builds, pushes, then SSHs into server
#      - Server pulls new images and restarts containers
#      - Simple, auditable, works for single-server deployments
#
################################################################################

name: Deploy DEV Environment

on:
  push:
    branches:
      - dev          # Trigger on push to dev branch
      - main         # Optional: also deploy from main
  workflow_dispatch: # Allow manual trigger for rollbacks or testing

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel running deployments

# Environment variables used across all jobs
env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  REGISTRY: docker.io
  BACKEND_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/jobber-backend
  FRONTEND_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/jobber-frontend

jobs:
  ############################################################################
  # Job 1: Detect Changes
  # Uses path filters to determine which services need rebuilding
  ############################################################################
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    
    # Outputs used by downstream jobs to conditionally build/deploy
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for path-based changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'be/**'
              - 'docker-compose.yml'
            frontend:
              - 'fe/**'
              - 'docker-compose.yml'
              - 'Caddyfile'
      
      - name: Display detected changes
        run: |
          echo "Backend changed: ${{ steps.filter.outputs.backend }}"
          echo "Frontend changed: ${{ steps.filter.outputs.frontend }}"

  ############################################################################
  # Job 2: Run Backend Unit Tests
  # Only runs if backend code changed
  ############################################################################
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: be/go.sum

      - name: Download dependencies
        working-directory: ./be
        run: go mod download

      - name: Run unit tests
        working-directory: ./be
        run: |
          echo "🧪 Running unit tests..."
          go test -v -race -coverprofile=coverage.out ./...
          
          echo ""
          echo "📊 Coverage Summary:"
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: be/coverage.out
          retention-days: 7

  ############################################################################
  # Job 3: Lint & Build Frontend
  # Only runs if frontend code changed
  ############################################################################
  test-frontend:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@klukvas'
          cache: 'npm'
          cache-dependency-path: fe/package-lock.json

      - name: Install dependencies
        working-directory: ./fe
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run ESLint
        working-directory: ./fe
        run: |
          echo "🔍 Running ESLint..."
          npm run lint

      - name: Run TypeScript check
        working-directory: ./fe
        run: |
          echo "📝 Running TypeScript type check..."
          npx tsc --noEmit

      - name: Build frontend
        working-directory: ./fe
        run: |
          echo "🏗️ Building frontend..."
          npm run build

  ############################################################################
  # Job 4: Build & Push Backend Image
  # Only runs if backend code changed AND tests pass
  ############################################################################
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: [detect-changes, test-backend, test-frontend]
    if: >-
      always() &&
      needs.detect-changes.outputs.backend == 'true' &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=dev

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./be
          file: ./be/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Set build tag output
        id: set_tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  ############################################################################
  # Job 5: Build & Push Frontend Image
  # Only runs if frontend code changed AND lint/build pass
  ############################################################################
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: [detect-changes, test-backend, test-frontend]
    if: >-
      always() &&
      needs.detect-changes.outputs.frontend == 'true' &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=dev

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./fe
          file: ./fe/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

          # IMPORTANT: VITE_API_BASE_URL build arg
          # This should match the server's public IP/domain.
          # If not set, docker-compose.yml will use the default.
          # For production deploys, consider making this configurable via GitHub Secret.
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL || '/api/v1' }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN || '' }}
            VITE_FEATURE_SENTRY=${{ secrets.VITE_FEATURE_SENTRY || 'false' }}
            VITE_FEATURE_PAYMENTS=${{ secrets.VITE_FEATURE_PAYMENTS || 'false' }}
            VITE_FEATURE_EMAIL_NOTIFICATIONS=${{ secrets.VITE_FEATURE_EMAIL_NOTIFICATIONS || 'true' }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Set build tag output
        id: set_tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  ############################################################################
  # Job 6: Deploy to Server
  # Always runs after builds complete (or are skipped)
  # Updates docker-compose.yml image tags and restarts containers
  # WILL NOT RUN if any test job fails (backend tests or frontend lint/build)
  ############################################################################
  deploy:
    name: Deploy to Hetzner Server
    runs-on: ubuntu-latest
    needs: [detect-changes, test-backend, test-frontend, build-backend, build-frontend]
    
    # Run even if build jobs were skipped (e.g., no changes)
    # This allows manual re-deploys via workflow_dispatch
    # Tests must pass if they ran - if any test fails, NO DEPLOYMENT
    if: always() && 
        (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
        (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped') &&
        (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
        (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Generate docker-compose.deploy.yml with image tags
        run: |
          # Use the SHA tag from the build job if it ran, otherwise fall back to 'dev'
          if [ "${{ needs.build-backend.result }}" = "success" ]; then
            BACKEND_TAG="${{ needs.build-backend.outputs.image_tag }}"
          else
            BACKEND_TAG="dev"
          fi

          if [ "${{ needs.build-frontend.result }}" = "success" ]; then
            FRONTEND_TAG="${{ needs.build-frontend.outputs.image_tag }}"
          else
            FRONTEND_TAG="dev"
          fi

          echo "Backend image tag: ${BACKEND_TAG}"
          echo "Frontend image tag: ${FRONTEND_TAG}"

          cat > docker-compose.deploy.yml <<EOF
          services:
            backend:
              image: ${{ env.BACKEND_IMAGE }}:${BACKEND_TAG}
            frontend:
              image: ${{ env.FRONTEND_IMAGE }}:${FRONTEND_TAG}
          EOF

          cat docker-compose.deploy.yml

      - name: Copy compose files to server
        run: |
          scp docker-compose.yml \
            docker-compose.deploy.yml \
            Caddyfile \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/jobber/

      - name: Sync secrets to server .env
        env:
          # Infrastructure
          V_JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          V_JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          V_DB_USER: ${{ secrets.DB_USER }}
          V_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          V_DB_NAME: ${{ secrets.DB_NAME }}
          V_REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          V_SERVER_ENV: ${{ secrets.SERVER_ENV }}
          V_ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          V_FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          V_LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          # S3
          V_S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          V_S3_BUCKET: ${{ secrets.S3_BUCKET }}
          V_S3_REGION: ${{ secrets.S3_REGION }}
          V_S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          V_S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          # AI
          V_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Google Calendar
          V_GOOGLE_CALENDAR_CLIENT_ID: ${{ secrets.GOOGLE_CALENDAR_CLIENT_ID }}
          V_GOOGLE_CALENDAR_CLIENT_SECRET: ${{ secrets.GOOGLE_CALENDAR_CLIENT_SECRET }}
          V_GOOGLE_CALENDAR_REDIRECT_URL: ${{ secrets.GOOGLE_CALENDAR_REDIRECT_URL }}
          V_GOOGLE_CALENDAR_FRONTEND_URL: ${{ secrets.GOOGLE_CALENDAR_FRONTEND_URL }}
          V_GOOGLE_CALENDAR_TOKEN_ENCRYPTION_KEY: ${{ secrets.GOOGLE_CALENDAR_TOKEN_ENCRYPTION_KEY }}
          # Email
          V_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          V_RESEND_FROM_ADDRESS: ${{ secrets.RESEND_FROM_ADDRESS }}
          # Payments
          V_PADDLE_API_KEY: ${{ secrets.PADDLE_API_KEY }}
          V_PADDLE_WEBHOOK_SECRET: ${{ secrets.PADDLE_WEBHOOK_SECRET }}
          V_PADDLE_ENVIRONMENT: ${{ secrets.PADDLE_ENVIRONMENT }}
          V_PADDLE_PRO_PRICE_ID: ${{ secrets.PADDLE_PRO_PRICE_ID }}
          V_PADDLE_ENTERPRISE_PRICE_ID: ${{ secrets.PADDLE_ENTERPRISE_PRICE_ID }}
          V_PADDLE_CLIENT_TOKEN: ${{ secrets.PADDLE_CLIENT_TOKEN }}
          # Sentry
          V_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          V_SENTRY_RELEASE: ${{ secrets.SENTRY_RELEASE }}
          # Feature flags
          V_FEATURE_SENTRY_ENABLED: ${{ secrets.FEATURE_SENTRY_ENABLED }}
          V_FEATURE_EMAIL_ENABLED: ${{ secrets.FEATURE_EMAIL_ENABLED }}
          V_FEATURE_PAYMENTS_ENABLED: ${{ secrets.FEATURE_PAYMENTS_ENABLED }}
        run: |
          # Build temp file with non-empty secrets only
          ENV_FILE=$(mktemp)
          add() { if [ -n "$2" ]; then printf '%s=%s\n' "$1" "$2" >> "$ENV_FILE"; fi; }

          # Infrastructure
          add "JWT_ACCESS_SECRET" "$V_JWT_ACCESS_SECRET"
          add "JWT_REFRESH_SECRET" "$V_JWT_REFRESH_SECRET"
          add "DB_USER" "$V_DB_USER"
          add "DB_PASSWORD" "$V_DB_PASSWORD"
          add "DB_NAME" "$V_DB_NAME"
          add "REDIS_PASSWORD" "$V_REDIS_PASSWORD"
          add "SERVER_ENV" "$V_SERVER_ENV"
          add "ALLOWED_ORIGINS" "$V_ALLOWED_ORIGINS"
          add "FRONTEND_URL" "$V_FRONTEND_URL"
          add "LOG_LEVEL" "$V_LOG_LEVEL"
          # S3
          add "S3_ENDPOINT" "$V_S3_ENDPOINT"
          add "S3_BUCKET" "$V_S3_BUCKET"
          add "S3_REGION" "$V_S3_REGION"
          add "S3_ACCESS_KEY" "$V_S3_ACCESS_KEY"
          add "S3_SECRET_KEY" "$V_S3_SECRET_KEY"
          # AI
          add "ANTHROPIC_API_KEY" "$V_ANTHROPIC_API_KEY"
          # Google Calendar
          add "GOOGLE_CALENDAR_CLIENT_ID" "$V_GOOGLE_CALENDAR_CLIENT_ID"
          add "GOOGLE_CALENDAR_CLIENT_SECRET" "$V_GOOGLE_CALENDAR_CLIENT_SECRET"
          add "GOOGLE_CALENDAR_REDIRECT_URL" "$V_GOOGLE_CALENDAR_REDIRECT_URL"
          add "GOOGLE_CALENDAR_FRONTEND_URL" "$V_GOOGLE_CALENDAR_FRONTEND_URL"
          add "GOOGLE_CALENDAR_TOKEN_ENCRYPTION_KEY" "$V_GOOGLE_CALENDAR_TOKEN_ENCRYPTION_KEY"
          # Email
          add "RESEND_API_KEY" "$V_RESEND_API_KEY"
          add "RESEND_FROM_ADDRESS" "$V_RESEND_FROM_ADDRESS"
          # Payments
          add "PADDLE_API_KEY" "$V_PADDLE_API_KEY"
          add "PADDLE_WEBHOOK_SECRET" "$V_PADDLE_WEBHOOK_SECRET"
          add "PADDLE_ENVIRONMENT" "$V_PADDLE_ENVIRONMENT"
          add "PADDLE_PRO_PRICE_ID" "$V_PADDLE_PRO_PRICE_ID"
          add "PADDLE_ENTERPRISE_PRICE_ID" "$V_PADDLE_ENTERPRISE_PRICE_ID"
          add "PADDLE_CLIENT_TOKEN" "$V_PADDLE_CLIENT_TOKEN"
          # Sentry
          add "SENTRY_DSN" "$V_SENTRY_DSN"
          add "SENTRY_RELEASE" "$V_SENTRY_RELEASE"
          # Feature flags
          add "FEATURE_SENTRY_ENABLED" "$V_FEATURE_SENTRY_ENABLED"
          add "FEATURE_EMAIL_ENABLED" "$V_FEATURE_EMAIL_ENABLED"
          add "FEATURE_PAYMENTS_ENABLED" "$V_FEATURE_PAYMENTS_ENABLED"

          SYNCED=$(wc -l < "$ENV_FILE" | tr -d ' ')
          echo "Syncing $SYNCED variables to server..."

          scp -p "$ENV_FILE" ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/.env.sync
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            cd ~/jobber && touch .env && chmod 600 .env
            while IFS= read -r line; do
              key="${line%%=*}"
              [ -z "$key" ] && continue
              grep -v "^${key}=" .env > .env.tmp && mv .env.tmp .env || true
              echo "$line" >> .env
            done < /tmp/.env.sync
            rm -f /tmp/.env.sync
            echo "✅ Secrets synced"
          '
          rm -f "$ENV_FILE"

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
          set -e  # Exit on any error

          cd ~/jobber

          echo "================================================"
          echo "Starting deployment at $(date)"
          echo "================================================"

          # Ensure jq is available (used for parsing docker compose health status)
          if ! command -v jq >/dev/null 2>&1; then
            echo "📦 jq not found — installing..."
            apt-get update -qq && apt-get install -y -qq jq
          fi

          # CRITICAL: Verify .env file exists
          # The .env file contains ALL runtime secrets (JWT, DB passwords, S3 credentials).
          # If missing, deployment MUST fail to prevent running with default/missing secrets.
          if [ ! -f .env ]; then
            echo "❌ ERROR: .env file not found!"
            echo "The .env file must exist on the server with all runtime secrets."
            echo "GitHub Actions NEVER creates this file - it must be manually provisioned."
            exit 1
          fi

          echo "✅ .env file exists"

          # Authenticate with Docker Hub
          echo ""
          echo "🔐 Authenticating with Docker Hub..."
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          # Capture current deployment state for rollback
          echo ""
          echo "📸 Capturing current deployment state..."
          docker compose -f docker-compose.yml -f docker-compose.deploy.yml config > .compose-backup.yml 2>/dev/null || true

          # Pull new images from Docker Hub
          # Uses both docker-compose.yml (base) and docker-compose.deploy.yml (SHA override)
          echo ""
          echo "📥 Pulling new images..."
          if ! docker compose -f docker-compose.yml -f docker-compose.deploy.yml pull; then
            echo "❌ Failed to pull images"
            docker logout
            exit 1
          fi

          # Deploy new containers
          # SAFE: This command:
          #   - Recreates containers with new images
          #   - Keeps named volumes intact (postgres_data, redis_data)
          #   - Maintains data persistence
          #   - Does NOT run `docker compose down -v` (which would destroy volumes!)
          echo ""
          echo "🚀 Deploying new containers..."
          if ! docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d --remove-orphans; then
            echo "❌ Failed to start containers"
            docker logout
            exit 1
          fi

          # Wait for services to become healthy with timeout
          echo ""
          echo "⏳ Waiting for services to become healthy..."
          TIMEOUT=120
          ELAPSED=0
          FAILED=false

          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Check for unhealthy or restarting containers
            UNHEALTHY=$(docker compose -f docker-compose.yml -f docker-compose.deploy.yml ps --format json 2>/dev/null | jq -r 'select(.Health == "unhealthy" or .State == "restarting" or .State == "exited") | .Name' 2>/dev/null || true)

            if [ -z "$UNHEALTHY" ]; then
              # Check if all expected services are running (4 total)
              RUNNING=$(docker compose -f docker-compose.yml -f docker-compose.deploy.yml ps --status running --format json 2>/dev/null | jq -s 'length' 2>/dev/null || echo "0")

              # Check services with healthchecks (postgres, redis, backend)
              HEALTHY=$(docker compose -f docker-compose.yml -f docker-compose.deploy.yml ps --format json 2>/dev/null | jq -r 'select(.Health == "healthy") | .Name' 2>/dev/null | wc -l | tr -d ' ')

              echo "Status: $RUNNING/5 running, $HEALTHY/3 healthy"

              if [ "$RUNNING" -ge 5 ] && [ "$HEALTHY" -ge 3 ]; then
                echo "✅ All services are healthy"
                break
              fi
            else
              echo "⚠️  Unhealthy services detected: $UNHEALTHY"
            fi

            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          # Verify deployment succeeded
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo ""
            echo "❌ Services failed to become healthy within ${TIMEOUT}s"
            echo ""
            echo "📊 Container status:"
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml ps
            echo ""
            echo "📋 Recent logs:"
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml logs --tail=50

            # Attempt rollback if backup exists
            if [ -f .compose-backup.yml ]; then
              echo ""
              echo "🔄 Attempting rollback to previous version..."
              docker compose -f .compose-backup.yml up -d --remove-orphans || true
              echo "⚠️  Rollback attempted - please verify system state manually"
            fi

            docker logout
            exit 1
          fi

          # Run smoke tests
          echo ""
          echo "🧪 Running smoke tests..."

          # Test backend health (port not exposed to host, so use docker exec)
          BACKEND_HEALTHY=false
          for i in 1 2 3; do
            if docker exec jobber-backend wget -q --spider http://localhost:8080/health 2>/dev/null; then
              BACKEND_HEALTHY=true
              echo "✅ Backend health check passed"
              break
            fi
            echo "⚠️  Backend health check attempt $i/3 failed, retrying..."
            sleep 3
          done

          if [ "$BACKEND_HEALTHY" = false ]; then
            echo "❌ Backend health check failed after 3 attempts"
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml logs backend --tail=30
            docker logout
            exit 1
          fi

          # Test frontend via Caddy (HTTPS)
          if curl -f -s -k https://localhost > /dev/null 2>&1; then
            echo "✅ Frontend health check passed (HTTPS)"
          else
            echo "⚠️  Frontend health check failed (non-critical)"
          fi

          # Run database seed (creates reviewer account for Chrome Web Store)
          echo ""
          echo "🌱 Running database seed..."
          docker exec jobber-backend ./jobber-seed || echo "⚠️  Seed failed (non-critical)"

          # Show final status
          echo ""
          echo "📊 Final service status:"
          docker compose -f docker-compose.yml -f docker-compose.deploy.yml ps

          # Cleanup
          docker logout
          rm -f .compose-backup.yml

          echo ""
          echo "================================================"
          echo "✅ Deployment completed successfully at $(date)"
          echo "================================================"

          ENDSSH

  ############################################################################
  # Post-Deployment Summary
  ############################################################################
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, test-backend, test-frontend, build-backend, build-frontend, deploy]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate summary
        run: |
          SHA_SHORT=$(git rev-parse --short ${{ github.sha }})

          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.deploy.result == 'success' && '✅ Success' || (needs.deploy.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quality Gates:" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Unit Tests | ${{ needs.test-backend.result == 'success' && '✅ Passed' || (needs.test-backend.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Lint & Build | ${{ needs.test-frontend.result == 'success' && '✅ Passed' || (needs.test-frontend.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build & Deploy:" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.build-backend.result == 'success' && '✅ Built & Deployed' || (needs.build-backend.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.build-frontend.result == 'success' && '✅ Built & Deployed' || (needs.build-frontend.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Tags:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.BACKEND_IMAGE }}:${SHA_SHORT}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.FRONTEND_IMAGE }}:${SHA_SHORT}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "### Access URLs:" >> $GITHUB_STEP_SUMMARY
            echo "- 🌐 Application: http://${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
            echo "- 🔧 API: http://${{ secrets.SERVER_HOST }}:8080/api/v1" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-backend.result }}" == "failure" ] || [ "${{ needs.test-frontend.result }}" == "failure" ]; then
            echo "### 🚫 Deployment Blocked" >> $GITHUB_STEP_SUMMARY
            echo "Quality gates failed. Deployment was prevented to protect production." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "Check the deployment logs for details. Rollback may have been attempted automatically." >> $GITHUB_STEP_SUMMARY
          fi

################################################################################
# ROLLBACK PROCEDURE
################################################################################
#
# To rollback to a previous version:
#
#   1. Go to Actions tab in GitHub
#   2. Select "Deploy DEV Environment" workflow
#   3. Click "Run workflow"
#   4. Select the branch and choose the commit you want to rollback to
#      (or manually checkout the old commit locally and push)
#   5. The workflow will rebuild images with that commit's SHA
#   6. Server will pull and restart with the old version
#
# Alternative (manual rollback on server):
#
#   ssh into server and run:
#   
#   docker compose -f docker-compose.yml -f docker-compose.deploy.yml pull
#   
#   # Edit docker-compose.deploy.yml to use the old SHA
#   # Then restart:
#   
#   docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d
#
################################################################################

################################################################################
# REQUIRED GITHUB SECRETS
################################################################################
#
# You must configure these secrets in your GitHub repository:
# Settings → Secrets and variables → Actions → New repository secret
#
#   DOCKERHUB_USERNAME    - Your Docker Hub username
#   DOCKERHUB_TOKEN       - Docker Hub access token (not password!)
#                           Create at: https://hub.docker.com/settings/security
#                           Used for: Image push/pull authentication
#
#   SSH_PRIVATE_KEY       - Private SSH key for server access
#                           Generate: ssh-keygen -t ed25519 -C "github-actions"
#                           Add public key to server: ~/.ssh/authorized_keys
#                           Note: The private key is handled by ssh-agent (never written to disk)
#
#   SERVER_HOST           - Server IP or domain (e.g., 1.2.3.4 or app.example.com)
#   SERVER_USER           - SSH username (e.g., root, ubuntu, or deploy)
#                           Recommendation: Use dedicated deploy user, not root
#
#   VITE_API_BASE_URL     - (Optional) API URL for frontend build
#                           Example: http://65.108.123.45:8080/api/v1
#                           If not set, uses docker-compose.yml default
#
################################################################################
#
# SECURITY IMPROVEMENTS IN THIS VERSION:
#
# ✅ SSH private key never written to disk (uses ssh-agent)
# ✅ StrictHostKeyChecking enabled (uses known_hosts)
# ✅ Docker Hub authentication on server for private repos
# ✅ Automatic rollback on deployment failure
# ✅ Health checks with timeout before marking deployment successful
# ✅ Smoke tests verify critical endpoints
# ✅ Concurrency control prevents simultaneous deployments
# ✅ No deprecated Docker Compose syntax
#
################################################################################
