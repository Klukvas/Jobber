    - refresh_token
    type: object
  github_com_andreypavlenko_jobber_modules_auth_model.RegisterRequest:
    properties:
      email:
        type: string
      locale:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  github_com_andreypavlenko_jobber_modules_auth_service.RegisterResponse:
    properties:
      message:
        type: string
    type: object
  github_com_andreypavlenko_jobber_modules_comments_model.CommentDTO:
    properties:
      application_id:
        type: string
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      stage_id:
        type: string
    type: object
  github_com_andreypavlenko_jobber_modules_comments_model.CreateCommentRequest:
    properties:
      application_id:
        type: string
      content:
        minLength: 1
