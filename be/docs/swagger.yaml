  github_com_andreypavlenko_jobber_modules_applications_model.ApplicationStageDTO:
    properties:
      application_id:
        type: string
      completed_at:
        type: string
      created_at:
        type: string
      id:
        type: string
      order:
        type: integer
      stage_name:
        type: string
      stage_template_id:
        type: string
      started_at:
        type: string
      status:
        type: string
    type: object
  github_com_andreypavlenko_jobber_modules_applications_model.CompleteStageRequest:
    properties:
      completed_at:
        type: string
    type: object
  github_com_andreypavlenko_jobber_modules_applications_model.CreateApplicationRequest:
    properties:
      applied_at:
