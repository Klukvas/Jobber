  github_com_andreypavlenko_jobber_modules_matchscore_model.MatchScoreResponse:
    properties:
      categories:
        items:
          $ref: '#/definitions/github_com_andreypavlenko_jobber_modules_matchscore_model.MatchScoreCategory'
