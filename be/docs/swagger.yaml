      created_at:
        type: string
      derived_status:
        type: string
      id:
        type: string
      is_favorite:
        type: boolean
      last_activity_at:
        type: string
      location:
        type: string
      name:
        type: string
      notes:
        type: string
      updated_at:
        type: string
    type: object
  github_com_andreypavlenko_jobber_modules_companies_model.CreateCompanyRequest:
    properties:
      location:
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
      notes:
        type: string
    required:
    - name
    type: object
  github_com_andreypavlenko_jobber_modules_companies_model.UpdateCompanyRequest:
    properties:
      location:
        type: string
      name:
        type: string
      notes:
        type: string
    type: object
  github_com_andreypavlenko_jobber_modules_jobimport_model.ParseJobRequest:
    properties:
      page_text:
        maxLength: 50000
        minLength: 10
        type: string
      page_url:
        type: string
    required:
    - page_text
    - page_url
    type: object
  github_com_andreypavlenko_jobber_modules_jobimport_model.ParseJobResponse:
    properties:
      company_name:
        type: string
      description:
        type: string
      source:
        type: string
      title:
        type: string
      url:
        type: string
    type: object
  github_com_andreypavlenko_jobber_modules_jobs_model.CreateJobRequest:
    properties:
      company_id:
        type: string
      description:
        type: string
      notes:
        type: string
      source:
        type: string
      title:
        maxLength: 255
        minLength: 1
        type: string
      url:
        type: string
    required:
    - title
    type: object
  github_com_andreypavlenko_jobber_modules_jobs_model.JobDTO:
    properties:
      applications_count:
        type: integer
      company_id:
        type: string
      company_name:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_favorite:
        type: boolean
      notes:
        type: string
      source:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
      url:
        type: string
    type: object
  github_com_andreypavlenko_jobber_modules_jobs_model.UpdateJobRequest:
    properties:
      company_id:
        type: string
      description:
        type: string
      notes:
        type: string
      source:
        type: string
      status:
        type: string
      title:
        type: string
      url:
        type: string
    type: object
  github_com_andreypavlenko_jobber_modules_matchscore_model.MatchScoreCategory:
    properties:
      details:
        type: string
      name:
        type: string
      score:
        type: integer
    type: object
  github_com_andreypavlenko_jobber_modules_matchscore_model.MatchScoreRequest:
    properties:
      job_id:
        type: string
      resume_id:
        type: string
