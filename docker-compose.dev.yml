version: '3.8'

# Local development: only Postgres + Redis
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobber-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-jobber}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jobber}
      POSTGRES_DB: ${DB_NAME:-jobber}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jobber}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobber-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: jobber-postgres-data
  redis_data:
    name: jobber-redis-data
